# =============================================================================
# ANSIBLE INVENTORY TEMPLATE
# homelab-iac | ansible/inventory/inventory.sample.ini
# =============================================================================
# PURPOSE:
#   This is your starting point. Copy this file to `hosts.ini`, fill in your
#   real IPs and usernames, and never commit that file to version control.
#   Add `hosts.ini` to your .gitignore.
#
# HOW GROUPS MAP TO PLAYBOOKS:
#   [all:vars]   — Connection defaults applied to every host in this file.
#   [lan]        — Your primary trusted network. Targeted by provision_base,
#                  provision_ubuntu_docker, upgrade, and maintenance playbooks.
#   [docker]     — Subset of LAN hosts that run Docker. Used by Docker-specific
#                  playbooks (portainer_update, provision_*_docker).
#   [proxmox]    — Proxmox hypervisor nodes. Targeted by Proxmox automation
#                  playbooks (separate from Docker hosts).
#   [dmz]        — Hosts in your DMZ / untrusted segment. Treated with tighter
#                  playbook scope — provisioned separately from LAN.
#   [vpn_net]    — Hosts reachable only over VPN. Ensure your control node
#                  has an active VPN connection before targeting this group.
#
# TIP: A host can belong to multiple groups. Example — a Docker host on LAN:
#   Add it to both [lan] and [docker]. Ansible merges group vars automatically.
# =============================================================================


# -----------------------------------------------------------------------------
# GLOBAL CONNECTION DEFAULTS
# -----------------------------------------------------------------------------
# These vars apply to every host unless overridden at group or host level.
[all:vars]

# Path to the SSH private key on your Ansible CONTROL NODE (not the target).
# Generate one with: ssh-keygen -t ed25519 -C "ansible"
ansible_ssh_private_key_file=~/.ssh/ansible_ed25519

# Python interpreter path on your TARGET hosts.
ansible_python_interpreter=/usr/bin/python3

# Default SSH user Ansible will connect as.
# Override per-host with ansible_user= if hosts have different users.
ansible_user=your_default_ssh_user


# -----------------------------------------------------------------------------
# LAN — Primary trusted network
# -----------------------------------------------------------------------------
# Replace 10.0.0.X with your actual LAN IPs.
# Replace `your_user` with the non-root sudo user on each host.
#
# Playbooks that target [lan]:
#   - provision_base.yml
#   - upgrade.yml
#   - maintenance.yml
# -----------------------------------------------------------------------------
[lan]
# ansible_host = the IP Ansible will SSH to
# ansible_user = overrides the [all:vars] default for this specific host
control_node  ansible_host=10.0.0.10  ansible_user=your_user
server_01     ansible_host=10.0.0.20  ansible_user=your_user
server_02     ansible_host=10.0.0.21  ansible_user=your_user


# -----------------------------------------------------------------------------
# DOCKER — Hosts running Docker + Portainer Agent
# -----------------------------------------------------------------------------
# Playbooks that target [docker]:
#   - provision_ubuntu_docker.yml
#   - provision_debian_docker.yml
#   - portainer_update.yml
# -----------------------------------------------------------------------------
[docker]
docker_host_01  ansible_host=10.0.0.30  ansible_user=your_user
docker_host_02  ansible_host=10.0.0.31  ansible_user=your_user


# -----------------------------------------------------------------------------
# PROXMOX — Hypervisor nodes
# -----------------------------------------------------------------------------
# Playbooks that target [proxmox]:
#   - (coming soon) proxmox_post_install.yml
# -----------------------------------------------------------------------------
[proxmox]
pve_primary    ansible_host=10.0.0.50  ansible_user=root
pve_secondary  ansible_host=10.0.0.51  ansible_user=root


# -----------------------------------------------------------------------------
# DMZ — Isolated / untrusted segment
# -----------------------------------------------------------------------------
# Ensure your control node can route to these IPs before running playbooks.
# Playbooks that target [dmz]:
#   - provision_base.yml (run separately with -l dmz flag)
# -----------------------------------------------------------------------------
[dmz]
dmz_host_01  ansible_host=192.168.80.10  ansible_user=your_user


# -----------------------------------------------------------------------------
# VPN_NET — Hosts only reachable over VPN tunnel
# -----------------------------------------------------------------------------
# Requires active VPN connection on control node before targeting.
# -----------------------------------------------------------------------------
[vpn_net]
vpn_host_01  ansible_host=10.10.0.10  ansible_user=your_user


# -----------------------------------------------------------------------------
# GROUP CHILDREN (optional — logical groupings)
# -----------------------------------------------------------------------------
# [infrastructure:children] lets you target all managed hosts at once
# while still being able to address subgroups individually.
[infrastructure:children]
lan
docker
proxmox
