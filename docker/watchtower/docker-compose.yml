# Watchtower — Automated Docker image updater with Slack notifications
# Uses nickfedor/watchtower (actively maintained fork of containrrr/watchtower)
# See README.md for setup guide and environment variable reference.

services:
  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: "${WATCHTOWER_POLL_INTERVAL:-86400}"
      WATCHTOWER_CLEANUP: "${WATCHTOWER_CLEANUP:-true}"
      WATCHTOWER_INCLUDE_STOPPED: "${WATCHTOWER_INCLUDE_STOPPED:-false}"
      WATCHTOWER_REVIVE_STOPPED: "${WATCHTOWER_REVIVE_STOPPED:-false}"
      WATCHTOWER_WARN_ON_HEAD_FAILURE: "${WATCHTOWER_WARN_ON_HEAD_FAILURE:-never}"
      DOCKER_API_VERSION: "${DOCKER_API_VERSION:-1.47}"
      WATCHTOWER_NOTIFICATIONS: "slack"
      WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL: "${WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL}"
      WATCHTOWER_NOTIFICATION_REPORT: "${WATCHTOWER_NOTIFICATION_REPORT:-true}"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/v1/update"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
